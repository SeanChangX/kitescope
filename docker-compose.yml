# KiteScope - Production
# Frontend (Nginx), Backend (FastAPI), Vision, go2rtc; SQLite volume

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_PREVIEW_INTERVAL_MS=${VITE_PREVIEW_INTERVAL_MS:-2000}
        - VITE_PREVIEW_STAGGER_MS=${VITE_PREVIEW_STAGGER_MS:-}
    image: seanchangx/kitescope-frontend:latest
    container_name: kitescope-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    environment:
      - NODE_ENV=production

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: seanchangx/kitescope-backend:latest
    container_name: kitescope-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - kitescope_data:/app/data
      - vision_models:/app/models
    environment:
      - DATABASE_URL=sqlite:////app/data/kitescope.db
      - INTERNAL_SECRET_FILE=/app/data/internal_secret
      - VISION_URL=http://vision:9000
      - VISION_PREVIEW_CONCURRENCY=${VISION_PREVIEW_CONCURRENCY:-8}
      - PREVIEW_CACHE_TTL=${PREVIEW_CACHE_TTL:-3.0}
      - MODELS_DIR=/app/models
      - GO2RTC_BASE_URL=http://go2rtc:1984
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  vision:
    build:
      context: ./vision
      dockerfile: Dockerfile
    image: seanchangx/kitescope-vision:latest
    container_name: kitescope-vision
    restart: unless-stopped
    volumes:
      - kitescope_data:/app/data
      - vision_models:/app/models
    environment:
      - GO2RTC_BASE_URL=http://go2rtc:1984
      - BACKEND_URL=http://backend:8000
      - INTERNAL_SECRET_FILE=/app/data/internal_secret
      - MODELS_DIR=/app/models
      - VISION_LOOP_INTERVAL_SEC=30
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9000/health')"]
      interval: 30s
      timeout: 2s
      retries: 5
      start_period: 10s
    depends_on:
      backend:
        condition: service_healthy
      go2rtc:
        condition: service_started

  go2rtc:
    image: alexxit/go2rtc:latest
    restart: unless-stopped
    container_name: kitescope-go2rtc
    ports:
      - "1984:1984"
    volumes:
      - go2rtc_config:/config

volumes:
  kitescope_data:
  vision_models:
  go2rtc_config:
